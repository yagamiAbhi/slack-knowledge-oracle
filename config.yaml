app:
  environment: "local"

slack:
  # The IDs of the channels you want to ingest during your batch run
  target_channels:
    - "C0ATPGQD295" # Replace with your actual Channel ID

models:
  llm:
    provider: "ollama"
    model_name: "qwen3:8b-q4_K_M" 
    temperature: 0.1
  
  embedder:
    provider: "ollama"
    model_name: "qwen3-embedding:0.6b" 

vector_store:
  provider: "chroma"
  collection_name: "slack_knowledge"
  persist_directory: "./chroma_db"

ingestion:
  chunk_size: 1000
  chunk_overlap: 200

retrieval:
  top_k: 5

logging:
  level: "DEBUG"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"